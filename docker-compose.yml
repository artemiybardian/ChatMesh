services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatmesh
      POSTGRES_PASSWORD: chatmesh_secret
      POSTGRES_DB: chatmesh_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatmesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: ./backend/auth
    ports:
      - "8001:8000"
      - "50051:50051"
    environment:
      DATABASE_URL: postgresql+asyncpg://chatmesh:chatmesh_secret@postgres:5432/chatmesh_auth
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    build: ./backend/chat
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chatmesh:chatmesh_secret@postgres:5432/chatmesh_chat
      REDIS_URL: redis://redis:6379
      AUTH_GRPC_HOST: auth
      AUTH_GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started

  websocket-gateway:
    build: ./backend/websocket_gateway
    ports:
      - "8003:8000"
    environment:
      REDIS_URL: redis://redis:6379
      AUTH_GRPC_HOST: auth
      AUTH_GRPC_PORT: "50051"
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started

  notifications:
    build: ./backend/notifications
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chatmesh:chatmesh_secret@postgres:5432/chatmesh_notifications
      REDIS_URL: redis://redis:6379
      AUTH_GRPC_HOST: auth
      AUTH_GRPC_PORT: "50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
      NEXT_PUBLIC_CHAT_API_URL: http://localhost:8002
      NEXT_PUBLIC_WS_URL: ws://localhost:8003
      NEXT_PUBLIC_NOTIFICATIONS_API_URL: http://localhost:8004
    depends_on:
      - auth
      - chat
      - websocket-gateway
      - notifications

volumes:
  postgres_data:
