services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatmesh
      POSTGRES_PASSWORD: chatmesh_secret
      POSTGRES_DB: chatmesh_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatmesh"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: chatmesh
      RABBITMQ_DEFAULT_PASS: chatmesh_secret
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth:
    build: ./backend/auth
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chatmesh:chatmesh_secret@postgres:5432/chatmesh_auth
      RABBITMQ_URL: amqp://chatmesh:chatmesh_secret@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  chat:
    build: ./backend/chat
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chatmesh:chatmesh_secret@postgres:5432/chatmesh_chat
      RABBITMQ_URL: amqp://chatmesh:chatmesh_secret@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped

  websocket-gateway:
    build: ./backend/websocket_gateway
    ports:
      - "8003:8000"
    environment:
      RABBITMQ_URL: amqp://chatmesh:chatmesh_secret@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped

  notifications:
    build: ./backend/notifications
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chatmesh:chatmesh_secret@postgres:5432/chatmesh_notifications
      RABBITMQ_URL: amqp://chatmesh:chatmesh_secret@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
      NEXT_PUBLIC_CHAT_API_URL: http://localhost:8002
      NEXT_PUBLIC_WS_URL: ws://localhost:8003
      NEXT_PUBLIC_NOTIFICATIONS_API_URL: http://localhost:8004
    depends_on:
      - auth
      - chat
      - websocket-gateway
      - notifications
    restart: unless-stopped

volumes:
  postgres_data:
